name: Deploy to Cloudflare

on:
  push:
    branches: [main]
    paths:
      - "src/web/**"
      - "src/api/**"
      - "package.json"
  pull_request:
    types: [opened, synchronize, reopened, closed]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: web-deploy-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  test:
    if: github.event_name != 'pull_request' || github.event.action != 'closed'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - run: pnpm install

      - name: Lint & typecheck API
        run: pnpm api:check && pnpm api:typecheck

      - name: Lint & typecheck Web
        run: pnpm web:check && pnpm web:typecheck

      - name: Test API
        run: pnpm --filter @nylon-impossible/api test

      - name: Test Web
        run: pnpm --filter @nylon-impossible/web test

  deploy-production:
    needs: [test]
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install dependencies
        run: pnpm install

      - name: Apply D1 migrations
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: src/api
          command: d1 migrations apply nylon-impossible-db --remote

      - name: Deploy API
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: src/api
          command: deploy --var ENVIRONMENT:production --var CF_ACCOUNT_ID:${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          secrets: |
            CLOUDFLARE_API_TOKEN
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Build Web
        run: pnpm --filter @nylon-impossible/web run build
        env:
          VITE_CLERK_PUBLISHABLE_KEY: ${{ secrets.VITE_CLERK_PUBLISHABLE_KEY }}
          VITE_SENTRY_DSN: ${{ secrets.VITE_SENTRY_DSN }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_WEB_PROJECT: ${{ secrets.SENTRY_WEB_PROJECT }}

      - name: Deploy Web
        working-directory: src/web
        run: pnpm exec wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

  deploy-preview:
    needs: [test]
    if: >-
      github.event_name == 'pull_request'
      && github.event.action != 'closed'
      && github.event.pull_request.head.repo.full_name == github.repository
      && github.event.pull_request.user.login != 'dependabot[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      pull-requests: write
      issues: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install dependencies
        run: pnpm install

      - name: Ensure preview research queue exists
        working-directory: src/api
        run: pnpm exec wrangler queues create nylon-impossible-research-pr-${{ github.event.pull_request.number }} 2>&1 || true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Rewrite API wrangler config for preview
        uses: actions/github-script@v9
        with:
          script: |
            const fs = require('fs');
            const pr = context.payload.pull_request.number;
            const dir = 'src/api';
            const name = `nylon-impossible-api-pr-${pr}`;
            const domain = `api-pr-${pr}.nylonimpossible.com`;
            const raw = fs.readFileSync(`${dir}/wrangler.jsonc`, 'utf8');
            const stripped = raw.replace(/\/\/.*$/gm, '').replace(/,\s*([}\]])/g, '$1');
            const config = JSON.parse(stripped);
            config.name = name;
            config.routes = [{ pattern: domain, custom_domain: true }];
            // Use a per-PR queue so each PR worker can register its own consumer
            // (Cloudflare allows one consumer per queue).
            // The DLQ is omitted from preview to avoid needing a second queue.
            const previewQueue = `nylon-impossible-research-pr-${pr}`;
            if (config.queues) {
              if (config.queues.producers) {
                config.queues.producers = config.queues.producers.map(p => ({ ...p, queue: previewQueue }));
              }
              if (config.queues.consumers) {
                config.queues.consumers = config.queues.consumers.map(({ dead_letter_queue, ...c }) => ({ ...c, queue: previewQueue }));
              }
            }
            fs.writeFileSync(`${dir}/wrangler.jsonc`, JSON.stringify(config, null, 2));

      - name: Rewrite Web wrangler config for preview
        uses: actions/github-script@v9
        with:
          script: |
            const fs = require('fs');
            const pr = context.payload.pull_request.number;
            const dir = 'src/web';
            const name = `nylon-impossible-pr-${pr}`;
            const domain = `pr-${pr}.nylonimpossible.com`;
            const raw = fs.readFileSync(`${dir}/wrangler.jsonc`, 'utf8');
            const stripped = raw.replace(/\/\/.*$/gm, '').replace(/,\s*([}\]])/g, '$1');
            const config = JSON.parse(stripped);
            config.name = name;
            config.routes = [{ pattern: domain, custom_domain: true }];
            fs.writeFileSync(`${dir}/wrangler.jsonc`, JSON.stringify(config, null, 2));

      - name: Apply D1 migrations
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: src/api
          command: d1 migrations apply nylon-impossible-db --remote

      - name: Deploy preview API
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: src/api
          command: deploy --var ENVIRONMENT:production --var CF_ACCOUNT_ID:${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Set preview API secrets
        working-directory: src/api
        run: |
          printf '%s' "$CLERK_SECRET_KEY" | pnpm exec wrangler secret put CLERK_SECRET_KEY
          printf '%s' "$CLERK_PUBLISHABLE_KEY" | pnpm exec wrangler secret put CLERK_PUBLISHABLE_KEY
          printf '%s' "$CLOUDFLARE_API_TOKEN" | pnpm exec wrangler secret put CLOUDFLARE_API_TOKEN
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}
          CLERK_PUBLISHABLE_KEY: ${{ secrets.CLERK_PUBLISHABLE_KEY }}

      - name: Upload preview Web secrets
        working-directory: src/web
        run: node -e "console.log(JSON.stringify({CLERK_SECRET_KEY:process.env.CLERK_SECRET_KEY,VITE_CLERK_PUBLISHABLE_KEY:process.env.VITE_CLERK_PUBLISHABLE_KEY}))" | pnpm exec wrangler secret bulk
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}
          VITE_CLERK_PUBLISHABLE_KEY: ${{ secrets.VITE_CLERK_PUBLISHABLE_KEY }}

      - name: Build preview Web
        run: pnpm --filter @nylon-impossible/web run build
        env:
          VITE_CLERK_PUBLISHABLE_KEY: ${{ secrets.VITE_CLERK_PUBLISHABLE_KEY }}
          VITE_SENTRY_DSN: ${{ secrets.VITE_SENTRY_DSN }}
          VITE_API_BASE_URL: https://api-pr-${{ github.event.pull_request.number }}.nylonimpossible.com
          VITE_IS_PREVIEW: true
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_WEB_PROJECT: ${{ secrets.SENTRY_WEB_PROJECT }}

      - name: Deploy preview Web
        working-directory: src/web
        run: pnpm exec wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Comment preview URLs on PR
        uses: actions/github-script@v9
        with:
          script: |
            const prNumber = context.payload.pull_request.number;
            const webUrl = `https://pr-${prNumber}.nylonimpossible.com`;
            const apiUrl = `https://api-pr-${prNumber}.nylonimpossible.com`;

            const body = [
              `### Preview Deployment`,
              ``,
              `| Worker | URL | Status |`,
              `|--------|-----|--------|`,
              `| API | ${apiUrl} | Deployed |`,
              `| Web | ${webUrl} | Deployed |`,
              ``,
              `_Deployed from ${context.sha.substring(0, 7)}_`,
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
            });

            const existing = comments.find(
              (c) => c.user.type === 'Bot' && c.body.includes('Preview Deployment')
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body,
              });
            }

  cleanup-preview:
    if: >-
      github.event_name == 'pull_request'
      && github.event.action == 'closed'
      && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read

    steps:
      - name: Delete preview API worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: delete --name nylon-impossible-api-pr-${{ github.event.pull_request.number }} --force
        continue-on-error: true

      - name: Delete preview Web worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: delete --name nylon-impossible-pr-${{ github.event.pull_request.number }} --force
        continue-on-error: true

      - name: Delete preview research queue
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: queues delete nylon-impossible-research-pr-${{ github.event.pull_request.number }}
        continue-on-error: true
