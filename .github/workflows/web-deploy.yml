name: Deploy to Cloudflare

on:
  push:
    branches: [main]
    paths:
      - "src/web/**"
      - "src/api/**"
      - "package.json"
  pull_request:
    types: [opened, synchronize, reopened, closed]
    paths:
      - "src/web/**"
      - "src/api/**"
      - "package.json"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: web-deploy-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  test:
    if: github.event_name != 'pull_request' || github.event.action != 'closed'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: pnpm install

      - name: Lint & typecheck API
        run: pnpm api:check && pnpm api:typecheck

      - name: Lint & typecheck Web
        run: pnpm web:check && pnpm web:typecheck

      - name: Test API
        run: pnpm --filter @nylon-impossible/api test

      - name: Test Web
        run: pnpm --filter @nylon-impossible/web test

  deploy-production:
    needs: [test]
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Detect changes
        if: github.event_name == 'push'
        uses: dorny/paths-filter@v4
        id: changes
        with:
          filters: |
            api:
              - 'src/api/**'
              - 'package.json'
              - '.github/workflows/web-deploy.yml'
            web:
              - 'src/web/**'
              - 'package.json'
              - '.github/workflows/web-deploy.yml'

      - name: Install pnpm
        uses: pnpm/action-setup@v5

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: pnpm install

      - name: Deploy API
        if: github.event_name == 'workflow_dispatch' || steps.changes.outputs.api == 'true'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: src/api
          command: deploy --var ENVIRONMENT:production

      - name: Build Web
        if: github.event_name == 'workflow_dispatch' || steps.changes.outputs.web == 'true'
        run: pnpm --filter @nylon-impossible/web run build
        env:
          VITE_CLERK_PUBLISHABLE_KEY: ${{ secrets.VITE_CLERK_PUBLISHABLE_KEY }}

      - name: Deploy Web
        if: github.event_name == 'workflow_dispatch' || steps.changes.outputs.web == 'true'
        working-directory: src/web
        run: pnpm exec wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

  deploy-preview:
    needs: [test]
    if: >-
      github.event_name == 'pull_request'
      && github.event.action != 'closed'
      && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Detect changes
        uses: dorny/paths-filter@v4
        id: changes
        with:
          filters: |
            api:
              - 'src/api/**'
              - 'package.json'
              - '.github/workflows/web-deploy.yml'
            web:
              - 'src/web/**'
              - 'package.json'
              - '.github/workflows/web-deploy.yml'

      - name: Install pnpm
        uses: pnpm/action-setup@v5

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: pnpm install

      - name: Rewrite API wrangler config for preview
        if: steps.changes.outputs.api == 'true'
        uses: actions/github-script@v8
        with:
          script: |
            const fs = require('fs');
            const pr = context.payload.pull_request.number;
            const dir = 'src/api';
            const name = `nylon-impossible-api-pr-${pr}`;
            const domain = `api-pr-${pr}.nylonimpossible.com`;
            const raw = fs.readFileSync(`${dir}/wrangler.jsonc`, 'utf8');
            const stripped = raw.replace(/\/\/.*$/gm, '').replace(/,\s*([}\]])/g, '$1');
            const config = JSON.parse(stripped);
            config.name = name;
            config.routes = [{ pattern: domain, custom_domain: true }];
            fs.writeFileSync(`${dir}/wrangler.jsonc`, JSON.stringify(config, null, 2));

      - name: Rewrite Web wrangler config for preview
        if: steps.changes.outputs.web == 'true'
        uses: actions/github-script@v8
        with:
          script: |
            const fs = require('fs');
            const pr = context.payload.pull_request.number;
            const dir = 'src/web';
            const name = `nylon-impossible-pr-${pr}`;
            const domain = `pr-${pr}.nylonimpossible.com`;
            const raw = fs.readFileSync(`${dir}/wrangler.jsonc`, 'utf8');
            const stripped = raw.replace(/\/\/.*$/gm, '').replace(/,\s*([}\]])/g, '$1');
            const config = JSON.parse(stripped);
            config.name = name;
            config.routes = [{ pattern: domain, custom_domain: true }];
            fs.writeFileSync(`${dir}/wrangler.jsonc`, JSON.stringify(config, null, 2));

      - name: Deploy preview API
        if: steps.changes.outputs.api == 'true'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: src/api
          command: deploy --var ENVIRONMENT:production
          secrets: |
            CLERK_SECRET_KEY
            CLERK_PUBLISHABLE_KEY
        env:
          CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}
          CLERK_PUBLISHABLE_KEY: ${{ secrets.CLERK_PUBLISHABLE_KEY }}

      - name: Upload preview Web secrets
        if: steps.changes.outputs.web == 'true'
        working-directory: src/web
        run: node -e "console.log(JSON.stringify({CLERK_SECRET_KEY:process.env.CLERK_SECRET_KEY,VITE_CLERK_PUBLISHABLE_KEY:process.env.VITE_CLERK_PUBLISHABLE_KEY}))" | pnpm exec wrangler secret bulk
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}
          VITE_CLERK_PUBLISHABLE_KEY: ${{ secrets.VITE_CLERK_PUBLISHABLE_KEY }}

      - name: Build preview Web
        if: steps.changes.outputs.web == 'true'
        run: pnpm --filter @nylon-impossible/web run build
        env:
          VITE_CLERK_PUBLISHABLE_KEY: ${{ secrets.VITE_CLERK_PUBLISHABLE_KEY }}
          VITE_API_BASE_URL: ${{ steps.changes.outputs.api == 'true' && format('https://api-pr-{0}.nylonimpossible.com', github.event.pull_request.number) || 'https://api.nylonimpossible.com' }}

      - name: Deploy preview Web
        if: steps.changes.outputs.web == 'true'
        working-directory: src/web
        run: pnpm exec wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Comment preview URLs on PR
        uses: actions/github-script@v8
        with:
          script: |
            const prNumber = context.payload.pull_request.number;
            const webUrl = `https://pr-${prNumber}.nylonimpossible.com`;
            const apiUrl = `https://api-pr-${prNumber}.nylonimpossible.com`;

            const apiChanged = '${{ steps.changes.outputs.api }}' === 'true';
            const webChanged = '${{ steps.changes.outputs.web }}' === 'true';

            const body = [
              `### Preview Deployment`,
              ``,
              `| Worker | URL | Status |`,
              `|--------|-----|--------|`,
              `| API | ${apiUrl} | ${apiChanged ? 'Deployed' : 'Skipped (unchanged)'} |`,
              `| Web | ${webUrl} | ${webChanged ? 'Deployed' : 'Skipped (unchanged)'} |`,
              ``,
              `_Deployed from ${context.sha.substring(0, 7)}_`,
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
            });

            const existing = comments.find(
              (c) => c.user.type === 'Bot' && c.body.includes('Preview Deployment')
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body,
              });
            }

  cleanup-preview:
    if: >-
      github.event_name == 'pull_request'
      && github.event.action == 'closed'
      && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read

    steps:
      - name: Delete preview API worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: delete --name nylon-impossible-api-pr-${{ github.event.pull_request.number }} --force
        continue-on-error: true

      - name: Delete preview Web worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: delete --name nylon-impossible-pr-${{ github.event.pull_request.number }} --force
        continue-on-error: true
