name: Test iOS

on:
  push:
    branches: [main]
    paths:
      - "src/ios/**"
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - "src/ios/**"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ios-tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    if: >-
      github.event_name != 'pull_request'
      || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: macos-26
    timeout-minutes: 20
    defaults:
      run:
        working-directory: src/ios/Nylon Impossible

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: SwiftLint
        run: |
          brew install swiftlint
          swiftlint

      - name: Select Xcode
        run: |
          xcodebuild -version

      - name: Run tests
        run: |
          xcrun simctl list runtimes
          DEVICE=$(xcrun simctl list devices available -j | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          devices = [d for devs in data['devices'].values() for d in devs if d.get('isAvailable') and 'iPhone' in d['name']]
          print(devices[0]['name'] if devices else '')
          ")
          if [ -z "$DEVICE" ]; then
            echo "No available iPhone simulator found, downloading iOS platform..."
            xcodebuild -downloadPlatform iOS
            DEVICE=$(xcrun simctl list devices available -j | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          devices = [d for devs in data['devices'].values() for d in devs if d.get('isAvailable') and 'iPhone' in d['name']]
          print(devices[0]['name'] if devices else 'iPhone 16 Pro')
            ")
          fi
          echo "Running tests on: $DEVICE"
          xcodebuild test \
            -project "Nylon Impossible.xcodeproj" \
            -scheme "Nylon Impossible" \
            -destination "platform=iOS Simulator,name=$DEVICE" \
            -resultBundlePath TestResults \
            -quiet
