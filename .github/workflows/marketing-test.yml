name: Test Marketing Web Capture

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test-web-capture:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up pnpm
        uses: pnpm/action-setup@v5

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install workspace dependencies
        run: pnpm install

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps
        working-directory: src/marketing

      - name: Apply D1 migrations and seed marketing data
        run: |
          npx wrangler d1 migrations apply nylon-impossible-db --local \
            --persist-to ../../.wrangler/state
          npx wrangler d1 execute nylon-impossible-db --local \
            --persist-to ../../.wrangler/state \
            --file=../../src/marketing/seed.sql
        working-directory: src/api

      - name: Verify secrets are set
        env:
          CLERK_DEVELOPMENT_PUBLISHABLE_KEY: ${{ secrets.CLERK_DEVELOPMENT_PUBLISHABLE_KEY }}
          CLERK_DEVELOPMENT_SECRET_KEY: ${{ secrets.CLERK_DEVELOPMENT_SECRET_KEY }}
          CLERK_DEVELOPMENT_USER_EMAIL: ${{ secrets.CLERK_DEVELOPMENT_USER_EMAIL }}
        run: |
          [ -n "$CLERK_DEVELOPMENT_PUBLISHABLE_KEY" ] && echo "✓ CLERK_DEVELOPMENT_PUBLISHABLE_KEY" || echo "✗ CLERK_DEVELOPMENT_PUBLISHABLE_KEY is empty"
          [ -n "$CLERK_DEVELOPMENT_SECRET_KEY" ]      && echo "✓ CLERK_DEVELOPMENT_SECRET_KEY"      || echo "✗ CLERK_DEVELOPMENT_SECRET_KEY is empty"
          [ -n "$CLERK_DEVELOPMENT_USER_EMAIL" ]      && echo "✓ CLERK_DEVELOPMENT_USER_EMAIL"      || echo "✗ CLERK_DEVELOPMENT_USER_EMAIL is empty"

      - name: Capture web screenshots
        env:
          VITE_CLERK_PUBLISHABLE_KEY: ${{ secrets.CLERK_DEVELOPMENT_PUBLISHABLE_KEY }}
          CLERK_SECRET_KEY: ${{ secrets.CLERK_DEVELOPMENT_SECRET_KEY }}
          CLERK_MARKETING_USER_EMAIL: ${{ secrets.CLERK_DEVELOPMENT_USER_EMAIL }}
        run: npx tsx generate.ts --capture-web
        working-directory: src/marketing

      - name: Upload screenshots
        uses: actions/upload-artifact@v4
        with:
          name: web-screenshots
          path: src/marketing/source/web-*.png
