name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: test-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  test-api:
    name: API Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run API tests
        run: pnpm --filter @nylon-impossible/api test

  test-web:
    name: Web Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Web tests
        run: pnpm --filter @nylon-impossible/web test

  # NOTE: This job requires Xcode 26+ (for iOS 26.2 deployment target).
  # Update the runner and Xcode version when GitHub Actions supports it.
  # Until then, this job will be skipped.
  test-ios:
    name: iOS Tests
    runs-on: macos-15
    if: false # Enable when macos runners have Xcode 26+
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run iOS tests
        working-directory: src/ios/Nylon Impossible
        run: |
          xcodebuild test \
            -project "Nylon Impossible.xcodeproj" \
            -scheme "Nylon Impossible" \
            -destination 'platform=iOS Simulator,name=iPhone 17 Pro' \
            -resultBundlePath TestResults \
            -quiet
