name: Test Web

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened, closed]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: web-test-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  test:
    if: github.event_name != 'pull_request' || github.event.action != 'closed'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Detect source file changes
        id: changes
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "src_changed=true" >> "$GITHUB_OUTPUT"
            exit 0
          elif [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE="${{ github.event.pull_request.base.sha }}"
            HEAD="${{ github.event.pull_request.head.sha }}"
          else
            BASE="${{ github.event.before }}"
            HEAD="${{ github.sha }}"
          fi
          if [ -z "$BASE" ] || [ "$BASE" = "0000000000000000000000000000000000000000" ]; then
            echo "src_changed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          CHANGED=$(git diff --name-only "$BASE" "$HEAD")
          echo "Changed files:"
          echo "$CHANGED"
          if echo "$CHANGED" | grep -qE '^(src/web|src/api|package\.json)'; then
            echo "src_changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "src_changed=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: pnpm/action-setup@v5
        if: steps.changes.outputs.src_changed == 'true'

      - uses: actions/setup-node@v4
        if: steps.changes.outputs.src_changed == 'true'
        with:
          node-version: 22

      - run: pnpm install
        if: steps.changes.outputs.src_changed == 'true'

      - name: Lint & typecheck API
        if: steps.changes.outputs.src_changed == 'true'
        run: pnpm api:check && pnpm api:typecheck

      - name: Lint & typecheck Web
        if: steps.changes.outputs.src_changed == 'true'
        run: pnpm web:check && pnpm web:typecheck

      - name: Test API
        if: steps.changes.outputs.src_changed == 'true'
        run: pnpm --filter @nylon-impossible/api test

      - name: Test Web
        if: steps.changes.outputs.src_changed == 'true'
        run: pnpm --filter @nylon-impossible/web test
