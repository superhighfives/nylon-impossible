name: Deploy Admin to Cloudflare

on:
  push:
    branches: [main]
    paths:
      - "src/admin/**"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: admin-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - run: pnpm install

      - name: Lint & typecheck Admin
        run: pnpm admin:check && pnpm admin:typecheck

  deploy-production:
    needs: [test]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install dependencies
        run: pnpm install

      - name: Build Admin
        run: pnpm --filter @nylon-impossible/admin run build
        env:
          VITE_CLERK_PUBLISHABLE_KEY: ${{ secrets.VITE_CLERK_PUBLISHABLE_KEY }}
          VITE_API_BASE_URL: https://api.nylonimpossible.com

      - name: Deploy Admin
        working-directory: src/admin
        run: pnpm exec wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
