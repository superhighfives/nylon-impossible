name: Test API with AI

on:
  workflow_dispatch:
    inputs:
      test_filter:
        description: "Test filter pattern (e.g., 'smart-create-ai' or leave empty for all)"
        required: false
        default: ""

permissions:
  contents: read

jobs:
  test-ai:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - run: pnpm install

      - name: Run AI tests
        env:
          RUN_AI_TESTS: "true"
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          TEST_FILTER: ${{ github.event.inputs.test_filter }}
        run: |
          if [ -n "$TEST_FILTER" ]; then
            pnpm --filter @nylon-impossible/api test -- --reporter=verbose "$TEST_FILTER"
          else
            pnpm --filter @nylon-impossible/api test -- --reporter=verbose
          fi
