name: Test API with AI

on:
  workflow_dispatch:
    inputs:
      test_filter:
        description: "Test filter pattern (e.g., 'smart-create-ai' or leave empty for all)"
        required: false
        default: ""

jobs:
  test-ai:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: pnpm install

      - name: Run AI tests
        env:
          RUN_AI_TESTS: "true"
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          if [ -n "${{ github.event.inputs.test_filter }}" ]; then
            pnpm --filter @nylon-impossible/api test -- --reporter=verbose "${{ github.event.inputs.test_filter }}"
          else
            pnpm --filter @nylon-impossible/api test -- --reporter=verbose
          fi
