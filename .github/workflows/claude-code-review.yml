name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]

# A called workflow can only narrow the caller's permissions, never widen them,
# and this repo's default workflow token is read-only. Without this block the
# run fails at startup before any job is created.
permissions:
  contents: read
  pull-requests: write
  issues: write
  id-token: write
  actions: read

jobs:
  review:
    # Standard lives in superhighfives/claude-code-reviews so every repo
    # reviews the same way. Repo-specific rules go in CLAUDE.md.
    uses: superhighfives/claude-code-reviews/.github/workflows/review.yml@main
    with:
      setup_command: pnpm install --frozen-lockfile
      verify_commands: |
        pnpm typecheck
        pnpm lint
    secrets:
      CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
