name: Deploy to TestFlight

on:
  push:
    branches: [main]
    paths:
      - "src/ios/**"
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - "src/ios/**"
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: testflight-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-deploy:
    if: >-
      github.event_name == 'push' ||
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'pull_request'
    runs-on: macos-26
    timeout-minutes: 30
    defaults:
      run:
        working-directory: src/ios/Nylon Impossible

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect API changes
        if: github.event_name == 'pull_request'
        uses: dorny/paths-filter@v3
        id: changes
        with:
          filters: |
            api:
              - 'src/api/**'

      - name: SwiftLint
        run: |
          brew install swiftlint
          swiftlint

      - name: Select Xcode
        run: |
          xcodebuild -version

      - name: Run tests
        run: |
          xcodebuild test \
            -project "Nylon Impossible.xcodeproj" \
            -scheme "Nylon Impossible" \
            -destination 'platform=iOS Simulator,name=iPhone 17 Pro' \
            -resultBundlePath TestResults \
            -quiet

      - name: Install Apple certificates and provisioning profile
        env:
          DEVELOPMENT_CERTIFICATE_BASE64: ${{ secrets.DEVELOPMENT_CERTIFICATE_BASE64 }}
          DISTRIBUTION_CERTIFICATE_BASE64: ${{ secrets.DISTRIBUTION_CERTIFICATE_BASE64 }}
          DISTRIBUTION_CERTIFICATE_PASSWORD: ${{ secrets.DISTRIBUTION_CERTIFICATE_PASSWORD }}
          PROVISIONING_PROFILE_BASE64: ${{ secrets.PROVISIONING_PROFILE_BASE64 }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          DEV_CERTIFICATE_PATH=$RUNNER_TEMP/development.p12
          DIST_CERTIFICATE_PATH=$RUNNER_TEMP/distribution.p12
          PROFILE_PATH=$RUNNER_TEMP/profile.mobileprovision
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db

          echo "$DEVELOPMENT_CERTIFICATE_BASE64" | base64 --decode > $DEV_CERTIFICATE_PATH
          echo "$DISTRIBUTION_CERTIFICATE_BASE64" | base64 --decode > $DIST_CERTIFICATE_PATH
          echo "$PROVISIONING_PROFILE_BASE64" | base64 --decode > $PROFILE_PATH

          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          # Import both certificates (same password)
          security import $DEV_CERTIFICATE_PATH -P "$DISTRIBUTION_CERTIFICATE_PASSWORD" \
            -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security import $DIST_CERTIFICATE_PATH -P "$DISTRIBUTION_CERTIFICATE_PASSWORD" \
            -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security set-key-partition-list -S apple-tool:,apple: \
            -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH

          # Debug: list signing identities in keychain
          echo "=== Signing identities in keychain ==="
          security find-identity -v -p codesigning $KEYCHAIN_PATH

          # Install provisioning profile with its UUID as filename
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          PROFILE_UUID=$(grep -a -o '[0-9a-fA-F]\{8\}-[0-9a-fA-F]\{4\}-[0-9a-fA-F]\{4\}-[0-9a-fA-F]\{4\}-[0-9a-fA-F]\{12\}' $PROFILE_PATH | head -1)
          echo "Installing profile with UUID: $PROFILE_UUID"
          cp $PROFILE_PATH ~/Library/MobileDevice/Provisioning\ Profiles/$PROFILE_UUID.mobileprovision
          ls -la ~/Library/MobileDevice/Provisioning\ Profiles/

      - name: Cache SPM packages
        uses: actions/cache@v4
        with:
          path: ${{ runner.temp }}/spm-cache
          key: spm-${{ hashFiles('**/Package.resolved') }}
          restore-keys: spm-

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true
          working-directory: src/ios/Nylon Impossible

      - name: Build and upload to TestFlight
        env:
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          APP_STORE_CONNECT_API_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          APP_STORE_CONNECT_API_KEY_CONTENT: ${{ secrets.ASC_KEY_CONTENT }}
          BUILD_NUMBER: ${{ github.run_number }}
          SPM_CACHE_PATH: ${{ runner.temp }}/spm-cache
          API_BASE_URL: ${{ github.event_name == 'pull_request' && steps.changes.outputs.api == 'true' && format('https://api-pr-{0}.nylonimpossible.com', github.event.pull_request.number) || 'https://api.nylonimpossible.com' }}
        run: bundle exec fastlane beta --verbose

      - name: Clean up keychain
        if: always()
        run: |
          security delete-keychain $RUNNER_TEMP/app-signing.keychain-db || true
