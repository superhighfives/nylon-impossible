name: Deploy Workers

on:
  push:
    branches: [main]
    paths:
      - "src/web/**"
      - "src/api/**"
      - "package.json"
      - ".github/workflows/deploy.yml"
  pull_request:
    types: [opened, synchronize, reopened, closed]
    paths:
      - "src/web/**"
      - "src/api/**"
      - "package.json"
      - ".github/workflows/deploy.yml"

concurrency:
  group: deploy-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  deploy-production:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: pnpm install

      - name: Deploy API
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: src/api
          command: deploy

      - name: Build Web
        run: pnpm --filter @nylon-impossible/web run build
        env:
          VITE_CLERK_PUBLISHABLE_KEY: ${{ secrets.VITE_CLERK_PUBLISHABLE_KEY }}

      - name: Deploy Web
        working-directory: src/web
        run: pnpm exec wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

  deploy-preview:
    if: github.event_name == 'pull_request' && github.event.action != 'closed'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: pnpm install

      - name: Rewrite wrangler configs for preview
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const pr = context.payload.pull_request.number;

            const previews = [
              ['src/api', `nylon-impossible-api-pr-${pr}`, `api-pr-${pr}.nylonimpossible.com`],
              ['src/web', `nylon-impossible-pr-${pr}`, `pr-${pr}.nylonimpossible.com`],
            ];

            for (const [dir, name, domain] of previews) {
              const raw = fs.readFileSync(`${dir}/wrangler.jsonc`, 'utf8');
              const stripped = raw.replace(/\/\/.*$/gm, '').replace(/,\s*([}\]])/g, '$1');
              const config = JSON.parse(stripped);
              config.name = name;
              config.routes = [{ pattern: domain, custom_domain: true }];
              fs.writeFileSync(`${dir}/wrangler.jsonc`, JSON.stringify(config, null, 2));
            }

      - name: Deploy preview API
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: src/api
          command: deploy
          secrets: |
            CLERK_SECRET_KEY
            CLERK_PUBLISHABLE_KEY
        env:
          CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}
          CLERK_PUBLISHABLE_KEY: ${{ secrets.CLERK_PUBLISHABLE_KEY }}

      - name: Upload preview Web secrets
        working-directory: src/web
        run: node -e "console.log(JSON.stringify({CLERK_SECRET_KEY:process.env.CLERK_SECRET_KEY,VITE_CLERK_PUBLISHABLE_KEY:process.env.VITE_CLERK_PUBLISHABLE_KEY}))" | pnpm exec wrangler secret bulk
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}
          VITE_CLERK_PUBLISHABLE_KEY: ${{ secrets.VITE_CLERK_PUBLISHABLE_KEY }}

      - name: Build preview Web
        run: pnpm --filter @nylon-impossible/web run build
        env:
          VITE_CLERK_PUBLISHABLE_KEY: ${{ secrets.VITE_CLERK_PUBLISHABLE_KEY }}

      - name: Deploy preview Web
        working-directory: src/web
        run: pnpm exec wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Comment preview URLs on PR
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = context.payload.pull_request.number;
            const webUrl = `https://pr-${prNumber}.nylonimpossible.com`;
            const apiUrl = `https://api-pr-${prNumber}.nylonimpossible.com`;

            const body = [
              `### Preview Deployment`,
              ``,
              `| Worker | URL |`,
              `|--------|-----|`,
              `| Web | ${webUrl} |`,
              `| API | ${apiUrl} |`,
              ``,
              `_Deployed from ${context.sha.substring(0, 7)}_`,
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
            });

            const existing = comments.find(
              (c) => c.user.type === 'Bot' && c.body.includes('Preview Deployment')
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body,
              });
            }

  cleanup-preview:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read

    steps:
      - name: Delete preview API worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: delete --name nylon-impossible-api-pr-${{ github.event.pull_request.number }} --force
        continue-on-error: true

      - name: Delete preview Web worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: delete --name nylon-impossible-pr-${{ github.event.pull_request.number }} --force
        continue-on-error: true
